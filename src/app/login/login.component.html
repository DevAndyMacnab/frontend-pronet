<div class="flex-1 flex items-center justify-center p-4 min-h-[80vh]">
  <div class="bg-white rounded-xl shadow-lg p-8 w-full max-w-md border border-gray-100">
    <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Iniciar sesión</h1>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
      <div class="flex flex-col gap-1.5">
        <label for="username" class="text-sm font-semibold text-gray-700">Usuario</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          autocomplete="username"
          placeholder="Tu usuario"
          class="border border-gray-300 rounded-md px-3 py-2.5 w-full focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="password" class="text-sm font-semibold text-gray-700">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="Tu contraseña"
          class="border border-gray-300 rounded-md px-3 py-2.5 w-full focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow"
        />
      </div>

      <button type="submit" [disabled]="form.invalid || loading()" class="mt-2 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 disabled:cursor-not-allowed text-white font-bold py-2.5 px-4 rounded-md transition-colors">
        {{ loading() ? 'Ingresando…' : 'Ingresar' }}
      </button>
    </form>

    <p class="text-red-500 text-sm mt-4 text-center font-medium bg-red-50 p-2 rounded" *ngIf="error()">{{ error() }}</p>

  </div>
</div>
